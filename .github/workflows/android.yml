name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.5
        fi
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug > build_log.txt 2>&1 || true

    - name: Upload APK
      run: |
        APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
        if [ -n "$APK_PATH" ]; then
          curl --upload-file "$APK_PATH" "https://transfer.sh/HIATOO-App-Debug.apk" > transfer_link.txt
          echo "" >> build_log.txt
          echo "DOWNLOAD LINK: " >> build_log.txt
          cat transfer_link.txt >> build_log.txt
        else
          echo "NO APK FOUND" >> build_log.txt
        fi

    - name: Commit build log
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add build_log.txt
        git commit -m "Update build log with download link" || true
        git pull --rebase || true
        git push || true
