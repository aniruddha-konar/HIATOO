name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.5
        fi
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug > build_log.txt 2>&1 || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HIATOO-App-Debug
        path: app/build/**/*.apk

    - name: Commit APK to branch
      run: |
        APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
        if [ -n "$APK_PATH" ]; then
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout --orphan apk-release
          git rm -rf .
          cp "$APK_PATH" app-debug.apk
          git add app-debug.apk
          git commit -m "Update APK"
          git push origin HEAD:apk-release -f
        fi
